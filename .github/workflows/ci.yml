# Continuous integration for cryptovault — the §0.1 quality gates on every
# push / PR to main: tests (nextest), clippy (warnings are errors), rustfmt,
# dependency audit, and warning-free docs.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (nextest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest run
        run: cargo nextest run --all-features
      - name: cargo test --doc
        run: cargo test --doc --all-features

  msrv:
    name: msrv (1.70)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.70
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      # MSRV 1.70 is the LIBRARY floor (what consumers need). The crate's own
      # dev-deps (proptest → tempfile → getrandom 0.4, edition 2024) require a
      # newer Cargo to resolve, so `--no-dev-deps` strips them: the library and
      # its normal deps (getrandom 0.2) build cleanly on 1.70.
      - name: cargo check (MSRV, library only)
        run: cargo hack check --no-dev-deps --all-features

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-features --tests -- -D warnings

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit

  doc:
    name: doc (no warnings)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc --no-deps
        run: cargo doc --no-deps --all-features
